app = "edu-canvas"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[deploy]
  strategy = "canary"
  release_command = "node scripts/db-migrate-runtime.mjs"
  release_command_timeout = "5m"

[env]
  APP_ENV = "production"
  DEMO_MODE = "false"
  SYNTHETIC_DATA_ONLY = "true"
  HOST = "0.0.0.0"
  PORT = "3000"
  NODE_ENV = "production"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = false
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    soft_limit = 20
    hard_limit = 40

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/api/health"

  [[http_service.checks]]
    grace_period = "20s"
    interval = "30s"
    method = "GET"
    timeout = "10s"
    path = "/api/readiness"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpus = 1
  cpu_kind = "shared"

[[restart]]
  policy = "on-failure"
  retries = 10

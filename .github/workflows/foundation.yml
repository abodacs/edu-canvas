name: Foundation checks

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  foundation:
    runs-on: ubuntu-latest
    env:
      APP_ENV: preview
      DEMO_MODE: 'false'
      SYNTHETIC_DATA_ONLY: 'true'
      DATABASE_URL: postgresql://edu_canvas:edu_canvas_dev@127.0.0.1:5432/edu_canvas
      # Test-only value: smoke covers deterministic generation and never calls OpenAI.
      OPENAI_API_KEY: ci-test-key
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: edu_canvas
          POSTGRES_USER: edu_canvas
          POSTGRES_PASSWORD: edu_canvas_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U edu_canvas -d edu_canvas"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0

      - name: Set up pnpm
        uses: pnpm/action-setup@v6.0.9
        with:
          version: 10.17.1

      - name: Set up Node.js
        uses: actions/setup-node@v7.0.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check Drizzle schema history
        run: pnpm db:drizzle:check

      - name: Run release checks
        run: pnpm check

      - name: Run tests with coverage
        run: pnpm test:coverage

      - name: Apply and repeat database bootstrap
        run: |
          pnpm db:setup
          pnpm db:migrate
          pnpm db:seed

      - name: Run PostgreSQL persistence parity tests
        run: pnpm test:database

      - name: Build and smoke-test the release image
        run: |
          docker build --tag edu-canvas:ci .
          docker run --detach --rm --name edu-canvas-ci \
            --publish 3010:3000 \
            --add-host host.docker.internal:host-gateway \
            --env APP_ENV=preview \
            --env DEMO_MODE=false \
            --env SYNTHETIC_DATA_ONLY=true \
            --env OPENAI_API_KEY=ci-test-key \
            --env DATABASE_URL=postgresql://edu_canvas:edu_canvas_dev@host.docker.internal:5432/edu_canvas \
            edu-canvas:ci
          cleanup() {
            docker rm -f edu-canvas-ci >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          test "$(docker inspect --format '{{.Config.User}}' edu-canvas-ci)" = "node"
          docker exec edu-canvas-ci node scripts/db-migrate-runtime.mjs

          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:3010/api/health >/dev/null; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              exit 1
            fi
            sleep 1
          done

          curl --fail --silent http://127.0.0.1:3010/api/readiness
          SMOKE_URL=http://127.0.0.1:3010 pnpm smoke

      - name: Smoke-test the built server
        run: |
          pnpm start > "$RUNNER_TEMP/edu-canvas-server.log" 2>&1 &
          server_pid=$!
          cleanup() {
            kill "$server_pid" 2>/dev/null || true
          }
          trap cleanup EXIT

          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:3000/api/health >/dev/null; then
              break
            fi
            sleep 1
          done

          curl --fail --silent http://127.0.0.1:3000/api/readiness
          pnpm smoke

name: Feature request
description: Suggest an idea or improvement
labels: ['enhancement']
body:
  - type: markdown
    attributes:
      value: 'Thanks for the suggestion. Please describe the problem and your proposed solution.'
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve?
      placeholder: "I'm always frustrated when..."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see?
      placeholder: "I'd like the product to..."
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternatives or workarounds?
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Who benefits and how?

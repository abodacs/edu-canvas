name: Bug report
description: Report a bug or regression
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: 'Thanks for reporting a bug. Please include as much detail as possible.'
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: Short, clear description
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Step-by-step instructions
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What actually happened?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs and screenshots
      description: Paste logs or add screenshots if relevant
      render: shell
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, browser, Node.js and pnpm versions, etc.
      placeholder: 'macOS 14.5, Chrome 123, Node.js 22, pnpm 10'
